<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenScape Lawn Care - Premium Lawn Services</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
--primary-green:#2d6a4f;
--secondary-green:#40916c;
--accent-green:#52b788;
--light-green:#d8f3dc;
--dark-green:#1b4332;
--warm-gray:#f4f1ea;
}
body{font-family:'Poppins',sans-serif;background:var(--warm-gray);margin:0}
.container{max-width:1200px;margin:auto;padding:0 20px}
.btn{padding:12px 30px;background:linear-gradient(135deg,var(--primary-green),var(--secondary-green));color:#fff;border-radius:50px}
.card{background:#fff;border-radius:20px;padding:2rem;box-shadow:0 10px 30px rgba(0,0,0,.1)}
.fade-in{opacity:0;transform:translateY(30px)}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader" style="position:fixed;inset:0;background:#f4f1ea;display:flex;align-items:center;justify-content:center;z-index:9999">
<h2>Loading GreenScape...</h2>
</div>

<!-- HERO -->
<section id="home" class="py-20 text-center">
<h1 class="text-4xl font-bold">GreenScape Lawn Care</h1>
<p>Premium lawn care services</p>
<button onclick="scrollToCalc()" class="btn mt-4">Get Instant Quote</button>
</section>

<!-- SERVICES -->
<section class="py-20 bg-green-100 text-center">
<h2 class="text-3xl font-bold mb-6">Our Services</h2>
<div class="grid md:grid-cols-3 gap-6 container">
<div class="card">Lawn Mowing - $35</div>
<div class="card">Fertilization - $50</div>
<div class="card">Landscaping - $75/hr</div>
</div>
</section>

<!-- CALCULATOR -->
<section id="calculator" class="py-20">
<div class="container grid md:grid-cols-2 gap-10">
<div class="card">
<h3 class="text-xl mb-4">Estimate Your Cost</h3>

<form id="calculatorForm">
<input type="number" id="lawnSize" placeholder="Lawn Size" class="border p-2 w-full mb-3">

<select id="serviceType" class="border p-2 w-full mb-3">
<option value="mowing">Mowing</option>
<option value="fertilization">Fertilization</option>
<option value="landscaping">Landscaping</option>
<option value="aeration">Aeration</option>
<option value="leaf-removal">Leaf Removal</option>
</select>

<select id="frequency" class="border p-2 w-full mb-3">
<option value="one-time">One-time</option>
<option value="weekly">Weekly</option>
<option value="bi-weekly">Bi-weekly</option>
<option value="monthly">Monthly</option>
</select>

<button class="btn w-full">Calculate</button>
</form>
</div>

<div id="calculatorResult" class="card hidden text-center">
<h4>Estimated Price</h4>
<div id="price" class="text-3xl font-bold"></div>
</div>
</div>
</section>

<!-- CONTACT -->
<section id="contact" class="py-20 bg-green-100">
<div class="container grid md:grid-cols-2 gap-10">

<div class="card">
<h3 class="text-xl mb-4">Send Message</h3>

<form id="contactForm" action="https://formspree.io/f/mwvagnez" method="POST">
<input name="name" required placeholder="Name" class="border p-2 w-full mb-3">
<input type="email" name="email" required placeholder="Email" class="border p-2 w-full mb-3">
<textarea name="message" required placeholder="Message" class="border p-2 w-full mb-3"></textarea>

<input type="hidden" name="_subject" value="New Lead">
<input type="hidden" name="_captcha" value="false">

<button class="btn w-full">Send</button>
</form>

</div>

<div class="card">
<h3>Contact Info</h3>
<p>(555) 123-4567</p>
<p>info@greenscape.com</p>
</div>

</div>
</section>

<!-- FOOTER -->
<footer class="text-center p-6 bg-green-800 text-white">
© GreenScape Lawn Care
</footer>

<script>

// LOADER
window.onload=()=>setTimeout(()=>loader.style.display="none",1200)

// SCROLL
function scrollToCalc(){
document.getElementById("calculator").scrollIntoView({behavior:"smooth"})
}

// CALCULATOR FIXED
document.getElementById("calculatorForm").addEventListener("submit",function(e){
e.preventDefault()

let size=parseFloat(lawnSize.value)
if(!size||isNaN(size)){alert("Enter valid size");return}

let service=serviceType.value
let freq=frequency.value

let base=0
if(service==="mowing") base=size*0.015
if(service==="fertilization") base=size*0.02
if(service==="landscaping") base=size*0.03
if(service==="aeration") base=size*0.01
if(service==="leaf-removal") base=size*0.008

let mult=1
if(freq==="weekly") mult=0.9
if(freq==="bi-weekly") mult=0.95
if(freq==="monthly") mult=1.05

let total=base*mult

price.innerText="$"+total.toFixed(2)
calculatorResult.classList.remove("hidden")
})

// FORM SUCCESS (does not block Formspree)
contactForm.addEventListener("submit",()=>{
setTimeout(()=>alert("Message sent!"),500)
})

// GSAP
gsap.registerPlugin(ScrollTrigger)
gsap.from("h1",{y:-50,opacity:0,duration:1})

</script>

</body>
</html>
