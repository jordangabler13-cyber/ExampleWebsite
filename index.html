<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenScape Lawn Care - Premium Lawn Services</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-green: #2d6a4f;
            --secondary-green: #40916c;
            --accent-green: #52b788;
            --light-green: #d8f3dc;
            --dark-green: #1b4332;
            --warm-gray: #f4f1ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--warm-gray);
            color: #333;
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: auto; padding: 0 20px; }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary-green), var(--secondary-green));
            color: white;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            border: none;
        }

        .btn:hover { transform: translateY(-2px); }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-green);
            color: var(--primary-green);
        }

        .section-title {
            font-size: 2.5rem;
            color: var(--dark-green);
            margin-bottom: 1rem;
            position: relative;
        }

        .section-title::after {
            content: '';
            width: 80px;
            height: 4px;
            background: var(--accent-green);
            position: absolute;
            bottom: -10px;
            left: 0;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .gradient-text {
            background: linear-gradient(90deg, var(--primary-green), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #ddd;
        }

        .form-control:focus {
            border-color: var(--primary-green);
            outline: none;
        }
    </style>
</head>

<body>

<!-- HERO -->
<section class="container py-20">
    <h1 class="section-title">GreenScape Lawn Care</h1>
    <p>Premium lawn services built for perfect outdoor spaces.</p>

    <div class="mt-6">
        <button class="btn">Get Quote</button>
        <button class="btn btn-outline">Book Service</button>
    </div>
</section>

<!-- SERVICES -->
<section class="container py-20">
    <h2 class="section-title">Services</h2>

    <div class="grid md:grid-cols-3 gap-6 mt-10">
        <div class="card">
            <h3>Lawn Mowing</h3>
            <p>$35 starting</p>
        </div>

        <div class="card">
            <h3>Fertilization</h3>
            <p>$50 per application</p>
        </div>

        <div class="card">
            <h3>Landscaping</h3>
            <p>$75/hour</p>
        </div>
    </div>
</section>

<!-- CALCULATOR -->
<section class="container py-20">
    <h2 class="section-title">Calculator</h2>

    <div class="card mt-6">
        <form id="calculatorForm">
            <input id="lawnSize" type="number" class="form-control mb-3" placeholder="Lawn Size">

            <select id="serviceType" class="form-control mb-3">
                <option value="mowing">Mowing</option>
                <option value="fertilization">Fertilization</option>
                <option value="landscaping">Landscaping</option>
            </select>

            <select id="frequency" class="form-control mb-3">
                <option value="one-time">One-time</option>
                <option value="weekly">Weekly</option>
                <option value="monthly">Monthly</option>
            </select>

            <button class="btn w-full">Calculate</button>
        </form>

        <div id="result" class="mt-4"></div>
    </div>
</section>

<!-- CONTACT -->
<section class="container py-20">
    <h2 class="section-title">Contact</h2>

    <form class="card mt-6"
          action="https://formspree.io/f/mwvagnez"
          method="POST"
          id="contactForm">

        <input name="name" class="form-control mb-3" placeholder="Name" required>
        <input name="email" type="email" class="form-control mb-3" placeholder="Email" required>
        <textarea name="message" class="form-control mb-3" placeholder="Message" required></textarea>

        <button class="btn w-full">Send</button>
    </form>
</section>

<script>
document.getElementById("calculatorForm").addEventListener("submit", function(e){
    e.preventDefault();

    let size = document.getElementById("lawnSize").value || 0;
    let type = document.getElementById("serviceType").value;

    let price = 0;

    if(type === "mowing") price = size * 0.015;
    if(type === "fertilization") price = size * 0.02;
    if(type === "landscaping") price = size * 0.03;

    document.getElementById("result").innerHTML =
        "<h3>Estimated Price: $" + price.toFixed(2) + "</h3>";
});
</script>

</body>
</html>
